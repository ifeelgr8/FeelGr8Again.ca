<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Choose Language</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #dfe4ea;
      font-family: Arial, sans-serif;
    }

    .stage {
      width: 100%;
      text-align: center;
    }

    .hero-image {
      display: block;
      width: 100%;
      height: auto;
    }

    .button-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 28px 20px 36px;
      max-width: 700px;
      margin: 0 auto;
    }

    .btn {
      flex: 1;
      text-align: center;
      padding: 16px 20px;
      font-weight: bold;
      text-decoration: none;
      color: white;
      border-radius: 14px;
      font-size: 18px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.2);
    }

    .en {
      background: linear-gradient(135deg, #2347b7, #2b63ef);
    }

    .fr {
      background: linear-gradient(135deg, #169a46, #28c55f);
    }

    @media (max-width: 700px) {
      .button-container {
        flex-direction: column;
        padding: 22px 20px 28px;
        gap: 16px;
      }

      .btn {
        font-size: 16px;
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="stage">
    <img src="./language-page.png" alt="Feel great again. It starts here." class="hero-image">

    <div class="button-container">
      <a href="/en/" class="btn en">🇬🇧 English</a>
      <a href="/fr/" class="btn fr">🇫🇷 Français</a>
    </div>
  </div>
</body>
</html>
