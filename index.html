<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choose Language</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: url('./language-page.png') no-repeat center center;
  background-size: cover;
  font-family: Arial, sans-serif;
  position: relative;
}

/* Button container */
.button-container {
  position: absolute;
  bottom: 10%; /* adjust this if needed */
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 25px;
}

/* Buttons */
.btn {
  padding: 16px 32px;
  font-size: 18px;
  border-radius: 12px;
  text-decoration: none;
  color: white;
  font-weight: bold;
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  transition: transform 0.2s ease, opacity 0.2s ease;
}

.btn:hover {
  transform: scale(1.05);
  opacity: 0.9;
}

/* English */
.en {
  background: linear-gradient(135deg, #1e3a8a, #2563eb);
}

/* French */
.fr {
  background: linear-gradient(135deg, #15803d, #22c55e);
}

/* Mobile */
@media (max-width: 600px) {
  .button-container {
    flex-direction: column;
    align-items: center;
    bottom: 8%;
  }

  .btn {
    width: 80%;
    text-align: center;
  }
}
</style>
</head>

<body>

<div class="button-container">
  <a href="/en/" class="btn en">🇬🇧 English</a>
  <a href="/fr/" class="btn fr">🇫🇷 Français</a>
</div>

</body>
</html>
