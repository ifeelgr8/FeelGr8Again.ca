<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Choose Language</title>
  <style>
    :root {
      --page-bg: #dfe4ea;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--page-bg);
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      overflow: hidden;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--page-bg);
    }

    .hero-image {
      display: block;
      width: auto;
      height: auto;
      max-width: 100vw;
      max-height: 100vh;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
    }

    .button-container {
      position: absolute;
      left: 50%;
      bottom: 8.5%;
      transform: translateX(-50%);
      display: flex;
      gap: 1.8vw;
      width: min(55vw, 760px);
      justify-content: center;
      pointer-events: auto;
    }

    .btn {
      flex: 1 1 0;
      min-width: 0;
      text-decoration: none;
      color: #fff;
      font-weight: 700;
      text-align: center;
      padding: 1.05vw 1.4vw;
      border-radius: 0.9vw;
      font-size: clamp(14px, 1.6vw, 28px);
      line-height: 1.15;
      box-shadow: 0 8px 20px rgba(0,0,0,0.22);
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .btn:hover,
    .btn:focus {
      transform: translateY(-1px) scale(1.02);
      opacity: 0.96;
    }

    .en {
      background: linear-gradient(135deg, #2347b7, #2b63ef);
    }

    .fr {
      background: linear-gradient(135deg, #169a46, #28c55f);
    }

    @media (max-width: 1100px) {
      .button-container {
        width: min(62vw, 640px);
        bottom: 8.2%;
        gap: 16px;
      }

      .btn {
        border-radius: 12px;
        padding: 13px 18px;
        font-size: clamp(14px, 1.9vw, 22px);
      }
    }

    @media (max-width: 700px) {
      .button-container {
        width: min(88vw, 360px);
        bottom: 4.8%;
        flex-direction: column;
        gap: 12px;
      }

      .btn {
        padding: 14px 16px;
        border-radius: 16px;
        font-size: clamp(15px, 4.8vw, 20px);
      }
    }

    @media (max-height: 650px) and (min-width: 701px) {
      .button-container {
        bottom: 5.5%;
      }
    }
  </style>
</head>
<body>
  <div class="stage">
    <img src="./language-page.png" alt="Feel great again. It starts here." class="hero-image">
    <div class="button-container">
      <a href="/en/" class="btn en" aria-label="Go to English page">🇬🇧 English</a>
      <a href="/fr/" class="btn fr" aria-label="Aller à la page française">🇫🇷 Français</a>
    </div>
  </div>
</body>
</html>
