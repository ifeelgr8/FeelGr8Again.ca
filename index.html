
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Choose Language</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #dfe4ea;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #dfe4ea;
    }

    .hero-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      display: block;
    }

    .button-container {
      position: absolute;
      left: 50%;
      bottom: 7%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
      width: auto;
      z-index: 2;
    }

    .btn {
      min-width: 220px;
      text-align: center;
      padding: 16px 28px;
      font-weight: 700;
      text-decoration: none;
      color: white;
      border-radius: 14px;
      font-size: 18px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.25);
    }

    .en {
      background: linear-gradient(135deg, #2347b7, #2b63ef);
    }

    .fr {
      background: linear-gradient(135deg, #169a46, #28c55f);
    }

    /* Tablet */
    @media (max-width: 1024px) {
      .hero-image {
        object-position: center 40%;
      }

      .button-container {
        bottom: 6%;
      }

      .btn {
        min-width: 200px;
        font-size: 17px;
        padding: 15px 24px;
      }
    }

    /* Mobile */
    @media (max-width: 700px) {
      .hero-image {
        object-position: center 32%;
      }

      .button-container {
        flex-direction: column;
        width: 85%;
        max-width: 340px;
        bottom: 4.5%;
        gap: 14px;
      }

      .btn {
        min-width: 0;
        width: 100%;
        font-size: 16px;
        padding: 16px;
        border-radius: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="stage">
    <img src="./language-page.png" alt="Feel great again. It starts here." class="hero-image">

    <div class="button-container">
      <a href="/en/" class="btn en">🇬🇧 English</a>
      <a href="/fr/" class="btn fr">🇫🇷 Français</a>
    </div>
  </div>
</body>
</html>
