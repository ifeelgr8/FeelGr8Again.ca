<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Choose Language</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #dfe4ea;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    .hero-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .button-container {
      position: absolute;
      bottom: 6%;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
      width: 90%;
      max-width: 500px;
    }

    .btn {
      flex: 1;
      text-align: center;
      padding: 14px;
      font-weight: bold;
      text-decoration: none;
      color: white;
      border-radius: 12px;
      font-size: 18px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.2);
    }

    .en {
      background: linear-gradient(135deg, #2347b7, #2b63ef);
    }

    .fr {
      background: linear-gradient(135deg, #169a46, #28c55f);
    }

    @media (max-width: 700px) {
      .button-container {
        flex-direction: column;
        bottom: 4%;
      }

      .btn {
        font-size: 16px;
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="stage">
    <img src="./language-page.png" alt="Feel great again. It starts here." class="hero-image">
    <div class="button-container">
      <a href="/en/" class="btn en">🇬🇧 English</a>
      <a href="/fr/" class="btn fr">🇫🇷 Français</a>
    </div>
  </div>
</body>
</html>
